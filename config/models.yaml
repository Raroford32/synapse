# Model routing configuration for Synapse
# Uses OpenRouter for all LLM access

# Model selection strategies
strategies:
  auto:
    description: "Automatically select model based on task complexity"
    rules:
      - condition: "code_task"
        model: "anthropic/claude-3-5-sonnet"
      - condition: "complex_reasoning"
        model: "anthropic/claude-3-5-sonnet"
      - condition: "simple_chat"
        model: "meta-llama/llama-3-8b-instruct"
      - condition: "default"
        model: "openai/gpt-4o-mini"
  
  cost-optimized:
    description: "Minimize costs while maintaining quality"
    default_model: "meta-llama/llama-3-8b-instruct"
    fallback_model: "openai/gpt-4o-mini"
  
  performance:
    description: "Maximum quality regardless of cost"
    default_model: "anthropic/claude-3-5-sonnet"
    fallback_model: "openai/gpt-4-turbo-preview"

# Available models via OpenRouter
models:
  # Fast models (low cost, quick response)
  fast:
    - id: "meta-llama/llama-3-8b-instruct"
      name: "Llama 3 8B"
      context_length: 8192
      cost_per_1k_tokens: 0.0001
    - id: "mistralai/mistral-7b-instruct"
      name: "Mistral 7B"
      context_length: 32768
      cost_per_1k_tokens: 0.00007
    - id: "openai/gpt-3.5-turbo"
      name: "GPT-3.5 Turbo"
      context_length: 16385
      cost_per_1k_tokens: 0.0005
  
  # Balanced models (good quality, moderate cost)
  balanced:
    - id: "openai/gpt-4o-mini"
      name: "GPT-4 Mini"
      context_length: 128000
      cost_per_1k_tokens: 0.00015
    - id: "meta-llama/llama-3-70b-instruct"
      name: "Llama 3 70B"
      context_length: 8192
      cost_per_1k_tokens: 0.0008
    - id: "mistralai/mixtral-8x7b-instruct"
      name: "Mixtral 8x7B"
      context_length: 32768
      cost_per_1k_tokens: 0.0005
  
  # Smart models (highest quality, higher cost)
  smart:
    - id: "anthropic/claude-3-5-sonnet"
      name: "Claude 3.5 Sonnet"
      context_length: 200000
      cost_per_1k_tokens: 0.003
    - id: "openai/gpt-4-turbo-preview"
      name: "GPT-4 Turbo"
      context_length: 128000
      cost_per_1k_tokens: 0.01
    - id: "anthropic/claude-3-opus"
      name: "Claude 3 Opus"
      context_length: 200000
      cost_per_1k_tokens: 0.015
    - id: "google/gemini-pro"
      name: "Gemini Pro"
      context_length: 32760
      cost_per_1k_tokens: 0.00125

# Task classification rules
task_classification:
  code_task:
    keywords: ["code", "debug", "implement", "function", "class", "error", "refactor", "test"]
    patterns: ["write.*code", "fix.*bug", "create.*function"]
  
  complex_reasoning:
    keywords: ["analyze", "explain", "compare", "evaluate", "design", "architect"]
    min_message_length: 500
    min_conversation_length: 5
  
  simple_chat:
    keywords: ["hello", "hi", "thanks", "bye", "yes", "no", "ok"]
    max_message_length: 100