version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: synapse-postgres
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: synapse_password
      POSTGRES_DB: synapse_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-network

  redis:
    image: redis:7-alpine
    container_name: synapse-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - synapse-network

  synapse:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: synapse-app
    ports:
      - "8000:8000"
    environment:
      # Database
      - DATABASE_URL=postgresql://synapse:synapse_password@postgres:5432/synapse_db
      - REDIS_URL=redis://redis:6379
      
      # OpenRouter (LLM Provider)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-Synapse}
      
      # OpenAI (Embeddings)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      
      # Security
      - JWT_SECRET=${JWT_SECRET:-default-secret-change-in-production}
      - API_KEY=${API_KEY:-default-key-change-in-production}
      
      # Model Configuration
      - DEFAULT_MODEL=${DEFAULT_MODEL:-openai/gpt-4o-mini}
      - SMART_MODEL=${SMART_MODEL:-anthropic/claude-3-5-sonnet}
      - FAST_MODEL=${FAST_MODEL:-meta-llama/llama-3-8b-instruct}
      - CODE_MODEL=${CODE_MODEL:-anthropic/claude-3-5-sonnet}
      
      # Application Settings
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      
      # RAG Configuration
      - R2R_VECTOR_DIMENSION=${R2R_VECTOR_DIMENSION:-1536}
      - R2R_CHUNK_SIZE=${R2R_CHUNK_SIZE:-512}
      - R2R_CHUNK_OVERLAP=${R2R_CHUNK_OVERLAP:-50}
      
      # Memory Configuration
      - MEM0_VECTOR_STORE=pgvector
      
      # MCP Configuration
      - MCP_ENABLED=${MCP_ENABLED:-true}
      - MCP_SERVER_PORT=${MCP_SERVER_PORT:-8001}
      
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    networks:
      - synapse-network
    restart: unless-stopped

  # Optional: Ollama for local models
  ollama:
    image: ollama/ollama:latest
    container_name: synapse-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - synapse-network
    profiles:
      - local
    restart: unless-stopped

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: synapse-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - synapse
    networks:
      - synapse-network
    profiles:
      - production
    restart: unless-stopped

networks:
  synapse-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local